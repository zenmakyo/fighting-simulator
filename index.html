<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>討伐シミュレータ</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Zen+Kurenaido&display=swap" rel="stylesheet">
</head>
<body>
  <h1>討伐勝率計算</h1>

 <div class="target-container">
    <div class="target-row">
        <button type="button" class="target-toggle-btn" onclick="toggleEnemyBox()">討伐対象</button>

       <div class="inputWrapper">
    <button type="button" id="targetSelectBtn" class="targetSelectBtn" onclick="toggleSearchMenu()">討伐対象を選択してください</button>
    
    <div id="targetMenu" class="targetMenu" style="display: none;">
        <input type="text" id="targetInput" class="targetInput" autocomplete="off" placeholder="名前を入力..." oninput="filterList()">
        <div id="targetSuggestions" class="targetSuggestions"></div>
    </div>
       </div>
    </div>
 </div>

    <div id="enemy-status-box" class="enemy-status-box" style="display: none;">
        <div class="status-item">
            <label>属性</label>
            <select id="e-attribute">
                <option value="獣">獣</option><option value="魔">魔</option>
                <option value="霊">霊</option><option value="無">無</option>
                <option value="地">地</option><option value="龍">龍</option>
            </select>
        </div>
        <div class="status-item">
            <label>Stamina</label>
            <input type="number" id="e-sta">
        </div>
        <div class="status-item">
            <label>Attack</label>
            <input type="number" id="e-atk">
        </div>
        <div class="status-item">
            <label>Defense</label>
            <input type="number" id="e-def">
        </div>
        <div class="status-item">
            <label>アビリティ</label>
            <select id="e-ability">
                <option value="none">なし</option>
                <option value="強打">強打</option>
                <option value="高揚">高揚</option>
                <option value="粉砕">粉砕</option>
            </select>
        </div>
    </div>
</div>

<div class="result-container">
    <table class="result-table">
        <tr>
            <th class="label-cell">結果</th>
            <td id="battle-result" class="value-cell">-</td>
            <td class="action-cell">
                <button type="button" id="reset-stats-btn" class="reset-btn">リセット</button>
            </td>
        </tr>
        
        <tr>
            <th class="label-cell">戦績</th>
            <td id="win-loss-count" class="value-cell">- 勝 - 敗</td>
            <td class="stacked-cell">
                <div class="stack-label">勝率</div>
                <div class="stack-value"><span id="win-rate">-</span> ％</div>
            </td>
        </tr>
        
        <tr>
            <th class="label-cell">最大/最小</th>
            <td class="value-cell">
                <span id="max-turns">-</span> / <span id="min-turns">-</span>
            </td>
            <td class="stacked-cell">
                <div class="stack-label">平均</div>
                <div class="stack-value"><span id="avg-turns">-</span> ターン</div>
            </td>
        </tr>
    </table>
</div>

<div class="my-phantom-manager">
    
    <div class="phantom-unit">
        <div class="phantom-header">
            <button type="button" class="phantom-toggle-btn" onclick="toggleDetail(1)">
                幻獣1
            </button>
            <div class="phantom-name-display" onclick="openLoadList(1)">
                <span id="display-name-1">未設定</span>
                <i class="arrow-icon">▼</i>
            </div>
        </div>

        <div id="detail-1" class="phantom-detail-area" style="display: none;">
            
            <div class="input-row">
                <div class="input-label">幻獣名</div>
                <div class="input-field full">
                    <input type="text" id="input-name-1" placeholder="名前を入力">
                </div>
            </div>

            <div class="input-row">
                <div class="input-label">属性</div>
                <div class="input-field full">
                    <select id="input-element-1">
                        <option value="獣">獣</option>
                        <option value="魔">魔</option>
                        <option value="霊">霊</option>
                        <option value="無">無</option>
                        <option value="地">地</option>
                        <option value="龍">龍</option>
                    </select>
                </div>
            </div>

            <div class="input-row">
                <div class="input-label">Stamina</div>
                <div class="input-field short">
                    <input type="number" id="base-hp-1" placeholder="0">
                </div>
                <div class="calc-res" id="res-hp-1">0</div>
            </div>

            <div class="input-row">
                <div class="input-label">Attack</div>
                <div class="input-field short">
                    <input type="number" id="base-atk-1" placeholder="0">
                </div>
                <div class="calc-res" id="res-atk-1">0</div>
            </div>

            <div class="input-row">
                <div class="input-label">Defense</div>
                <div class="input-field short">
                    <input type="number" id="base-def-1" placeholder="0">
                </div>
                <div class="calc-res" id="res-def-1">0</div>
            </div>

            <div class="input-row">
                <div class="input-label">Luck</div>
                <div class="input-field short">
                    <input type="number" id="base-luck-1" placeholder="0">
                </div>
                <div class="calc-res" id="res-luck-1">0</div>
            </div>

            <div class="input-row flex-col">
                <div class="sub-row">
                    <div class="input-label">武器</div>
                    <div class="input-field select-box item-name" id="select-weapon-1" onclick="openSearchList('weapon', 1)">
                        未選択
                    </div>
                    <div class="plus-select" id="plus-weapon-1" onclick="openPlusList('weapon', 1)">+20</div>
                </div>
                <div class="sub-row">
                    <div class="input-label sub">付与アビ</div>
                    <div class="input-field mid select-box" id="select-w-abi-1" onclick="openSearchList('ability', 1)">
                        未選択
                    </div>
                    <button type="button" class="small-btn" onclick="syncWeaponAbi(1)">重ね</button>
                </div>
            </div>

            <div class="input-row flex-col">
                <div class="sub-row">
                    <div class="input-label">防具</div>
                    <div class="input-field select-box item-name" id="select-armor-1" onclick="openSearchList('armor', 1)">
                        未選択
                    </div>
                    <div class="plus-select" id="plus-armor-1" onclick="openPlusList('armor', 1)">+20</div>
                </div>
                <div class="sub-row">
                    <div class="input-label sub">付与アビ</div>
                    <div class="input-field mid select-box" id="select-a-abi-1" onclick="openSearchList('ability', 1)">
                        未選択
                    </div>
                    <div class="btn-group">
                        <button type="button" class="small-btn">ソロ</button>
                        <button type="button" class="small-btn">極向</button>
                    </div>
                </div>
            </div>

            <div class="save-row">
                <button type="button" class="main-save-btn" onclick="openSaveTargetList(1)">
                    保存先を選択して保存
                </button>
            </div>
        </div>
    </div>
    </div>

<div id="dropdown-menu" class="dropdown-menu" style="display: none;">
    <input type="text" id="dropdown-search" placeholder="検索可能です..." autocomplete="off">
    <ul id="dropdown-items"></ul>
</div>

<script src="data.js"></script>
<script src="script.js"></script>
</body>
</html>
